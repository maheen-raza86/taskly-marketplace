databases:
  - name: taskly-db
    databaseName: taskly
    user: taskly
    plan: free

services:
  - type: web
    name: taskly-app
    runtime: docker
    plan: free
    region: oregon

    # Docker handles the build and start — no buildCommand/startCommand needed.
    # The Dockerfile exposes port 80 (Apache); Render routes traffic to it.
    dockerfilePath: ./Dockerfile

    envVars:
      - key: APP_NAME
        value: "Taskly"

      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: "false"

      - key: APP_KEY
        generateValue: true

      - key: APP_URL
        value: https://taskly-app.onrender.com

      # Database — connection string injected from the taskly-db service above
      - key: DB_CONNECTION
        value: pgsql

      - key: DATABASE_URL
        fromDatabase:
          name: taskly-db
          property: connectionString

      - key: SESSION_DRIVER
        value: database

      - key: SESSION_LIFETIME
        value: "120"

      - key: CACHE_STORE
        value: database

      - key: QUEUE_CONNECTION
        value: sync

      - key: FILESYSTEM_DISK
        value: local

      - key: LOG_CHANNEL
        value: stderr

      - key: LOG_LEVEL
        value: error

      - key: MAIL_MAILER
        value: log

      - key: MAIL_FROM_ADDRESS
        value: noreply@taskly.app

      - key: MAIL_FROM_NAME
        value: "Taskly"

      - key: BROADCAST_DRIVER
        value: log
